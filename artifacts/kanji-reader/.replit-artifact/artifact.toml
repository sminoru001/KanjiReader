kind = "mobile"
previewPath = "/"
title = "KanjiReader"
version = "1.0.0"
id = "artifacts/kanji-reader"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 25691

[services.development]
run = "pnpm --filter @workspace/kanji-reader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kanji-reader", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/kanji-reader", "run", "serve" ]

[services.env]
PORT = "25691"
BASE_PATH = "/"
